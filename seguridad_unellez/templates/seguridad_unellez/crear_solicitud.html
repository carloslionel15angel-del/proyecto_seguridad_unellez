{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Solicitud - SEGURIDAD UNELLEZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="flex min-h-screen">
        <!-- BARRA LATERAL (SIDEBAR) -->
        <aside class="w-64 bg-[#1E1E2F] text-white flex flex-col justify-between p-4 shadow-xl z-10">
            <div>
                <div class="flex flex-col items-center py-6 border-b border-gray-700 mb-6">
                    <img src="https://i.imgur.com/8Y6D8bA.png" alt="Logo UNELLEZ" class="h-14 mb-3 object-contain">
                    <span class="text-sm font-bold tracking-wider text-amber-500 text-center">SEGURIDAD UNELLEZ</span>
                </div>
                
                <nav class="space-y-2">
                    <a href="{% url 'mi_perfil' %}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-all duration-200">
                        <i class="fa-solid fa-user-shield text-lg"></i>
                        <span class="font-medium">Mi Perfil</span>
                    </a>
                    <a href="{% url 'mis_solicitudes' %}" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-amber-500 text-white shadow-md shadow-amber-500/20 transition-all duration-200">
                        <i class="fa-solid fa-calendar-check text-lg"></i>
                        <span class="font-medium">Mis Solicitudes</span>
                    </a>
                    <a href="{% url 'registrar_incidencia' %}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-all duration-200">
                        <i class="fa-solid fa-triangle-exclamation text-lg"></i>
                        <span class="font-medium">Reportar Novedad</span>
                    </a>
                </nav>
            </div>

            <div class="pt-4 border-t border-gray-700">
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all duration-200 text-left">
                        <i class="fa-solid fa-right-from-bracket text-lg"></i>
                        <span class="font-medium">Cerrar Sesión</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="flex-1 p-8 flex flex-col justify-start max-w-4xl mx-auto w-full">
            <div class="mb-8 border-b pb-4 border-gray-200">
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Nueva Solicitud Operativa</h1>
                <p class="text-gray-500 mt-1 text-base">Registra una petición administrativa dirigida a la coordinación de seguridad.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
                <div class="p-6 bg-slate-950 text-white flex items-center space-x-3">
                    <i class="fa-solid fa-file-pen text-amber-400 text-xl"></i>
                    <h2 class="font-bold text-lg">Formulario de Requerimientos</h2>
                </div>

                <!-- CORREGIDO: Se especificó la acción vacía para procesar sobre la misma vista del backend -->
                <form action="" method="POST" class="p-8 space-y-6">
                    {% csrf_token %}

                    <div class="space-y-2">
                        <label for="id_tipo" class="block font-bold text-gray-700 text-base">
                            <i class="fa-solid fa-list-check text-gray-400 mr-2"></i>Tipo de Solicitud:
                        </label>
                        <select name="tipo" id="id_tipo" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-base text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all">
                            <option value="" disabled selected>Seleccione el tipo de requerimiento...</option>
                            <option value="VACACIONES">Solicitud de Vacaciones</option>
                            <option value="PERMISO">Permiso Médico / Personal</option>
                            <option value="CAMBIO_TURNO">Cambio de Turno</option>
                            <option value="UNIFORME">Dotación de Uniforme / Equipos</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="id_fecha_inicio" class="block font-bold text-gray-700 text-base">
                                <i class="fa-regular fa-calendar-plus text-gray-400 mr-2"></i>Fecha de Inicio:
                            </label>
                            <input type="date" name="fecha_inicio" id="id_fecha_inicio" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-base text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all">
                        </div>

                        <div class="space-y-2">
                            <label for="id_fecha_fin" class="block font-bold text-gray-700 text-base">
                                <i class="fa-regular fa-calendar-check text-gray-400 mr-2"></i>Fecha de Finalización:
                            </label>
                            <input type="date" name="fecha_fin" id="id_fecha_fin" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-base text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="id_descripcion" class="block font-bold text-gray-700 text-base">
                            <i class="fa-solid fa-align-left text-gray-400 mr-2"></i>Justificación / Motivo:
                        </label>
                        <!-- NOTA: Asegúrate de que el backend procese el parámetro 'descripcion' o 'motivo' de manera uniforme -->
                        <textarea name="descripcion" id="id_descripcion" rows="5" required placeholder="Explique de forma detallada el motivo de su solicitud o el cambio requerido..." class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-base text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all resize-none"></textarea>
                    </div>

                    <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                        <a href="{% url 'mis_solicitudes' %}" class="px-5 py-3 rounded-xl font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors duration-150 text-base">
                            Cancelar
                        </a>
                        <button type="submit" class="px-6 py-3 rounded-xl font-bold text-white bg-slate-900 hover:bg-slate-800 shadow-lg shadow-slate-900/20 transition-all duration-150 hover:-translate-y-0.5">
                            <i class="fa-solid fa-paper-plane mr-2 text-amber-400"></i>Enviar al Administrador
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
