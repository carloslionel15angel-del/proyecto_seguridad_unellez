{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista Negra – UNELLEZ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8d7da; font-family: 'Segoe UI', sans-serif; }
        .table-container { background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body class="container py-5">
    <div class="table-container">
        <h2 class="text-danger mb-4"><i class="bi bi-shield-lock-fill"></i> Lista Negra - Oficiales Suspendidos</h2>
        <a href="{% url 'lista_guardias' %}" class="btn btn-secondary mb-3">Volver al Registro</a>
        
        <table class="table table-hover">
            <thead class="table-danger">
                <tr>
                    <th>Oficial</th>
                    <th>Cédula</th>
                    <th>Área</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for guardia in guardias %}
                <tr>
                    <td>{{ guardia.nombre }}</td>
                    <td>{{ guardia.cedula }}</td>
                    <td>{{ guardia.area_asignada }}</td>
                    <td>
                        <a href="{% url 'alternar_bloqueo_guardia' guardia.id %}" class="btn btn-sm btn-success">Desbloquear</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center">No hay oficiales en la lista negra.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
