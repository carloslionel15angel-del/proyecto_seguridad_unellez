<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Guardia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Eliminar guardia</h1>
    <p>¿Estás seguro de que deseas eliminar al guardia <strong>{{ guardia.nombre }}</strong> asignado en <strong>{{ guardia.area_asignada }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'lista_guardias' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
