<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Unellez</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar-brand { font-weight: bold; color: #ffc107 !important; }
        .nav-link { font-size: 0.95rem; white-space: nowrap; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">UNELLEZ</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item mx-2"><a class="nav-link" href="{% url 'panel_guardias' %}"><i class="fas fa-chart-line"></i> Monitoreo</a></li>
                    <li class="nav-item mx-2"><a class="nav-link" href="{% url 'chat_seguridad' %}" id="notificacion-chat"><i class="fas fa-comments"></i> Chat</a></li>
                    <li class="nav-item mx-2"><a class="nav-link" href="{% url 'mi_perfil' %}"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
                
                <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEmergencia">
                    <i class="fas fa-exclamation-triangle"></i> EMERGENCIA
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <div class="modal fade" id="modalEmergencia" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-danger">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Alerta de Emergencia</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">¿Confirma que desea enviar una alerta de emergencia?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <form action="{% url 'enviar_alerta' %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">ENVIAR ALERTA</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function verificarNuevosMensajes() {
            fetch('/api/mensajes-nuevos/')
                .then(response => response.json())
                .then(data => {
                    const iconoChat = document.getElementById('notificacion-chat');
                    if (data.nuevos > 0) {
                        iconoChat.innerHTML = `<i class="fas fa-comments"></i> Chat <span class="badge bg-warning text-dark">${data.nuevos}</span>`;
                    } else {
                        iconoChat.innerHTML = `<i class="fas fa-comments"></i> Chat`;
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        // Verifica cada 5 segundos
        setInterval(verificarNuevosMensajes, 5000);
        // Verifica al cargar la página
        verificarNuevosMensajes();
    </script>
</body>
</html>
