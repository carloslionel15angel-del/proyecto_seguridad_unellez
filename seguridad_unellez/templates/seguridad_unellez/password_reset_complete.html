<!DOCTYPE html>
<html>
<head>
    <title>Contraseña Cambiada - UNELLEZ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #28a745; width: 350px; text-align: center; }
        h2 { color: #1a2a40; margin-bottom: 1.5rem; }
        p { color: #555; margin-bottom: 1.5rem; }
        .btn-login { background: #1a2a40; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; display: inline-block; font-weight: bold; }
        .btn-login:hover { background: #b18c2e; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 3rem; color: #28a745; margin-bottom: 1rem;">✔</div>
        <h2>¡Éxito!</h2>
        <p>Tu contraseña ha sido actualizada correctamente. Ahora puedes iniciar sesión con tus nuevas credenciales.</p>
        <a href="{% url 'login' %}" class="btn-login">Ir al Inicio de Sesión</a>
    </div>
</body>
</html>
