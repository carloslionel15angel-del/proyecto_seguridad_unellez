<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Nuevo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="card mx-auto shadow" style="max-width: 600px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Registro de Nuevo Oficial</h3>
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Nombre</label>
                            {{ form.nombre }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Apellido</label>
                            {{ form.apellido }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Correo Electrónico</label>
                        {{ form.email }}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Cédula</label>
                            {{ form.cedula }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Nombre de Usuario</label>
                            {{ form.username }}
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Área Asignada</label>
                            {{ form.area_asignada }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Turno</label>
                            {{ form.turno }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Contraseña</label>
                        {{ form.password }}
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Registrar Oficial</button>
                        <a href="{% url 'lista_guardias' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
