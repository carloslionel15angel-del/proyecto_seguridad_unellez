<!DOCTYPE html>
<html>
<head>
    <title>Recuperar Contraseña - UNELLEZ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #b18c2e; width: 350px; text-align: center; }
        h2 { color: #1a2a40; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #1a2a40; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        button:hover { background: #b18c2e; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Recuperar Contraseña</h2>
        <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit">Enviar enlace</button>
        </form>
    </div>
</body>
</html>
