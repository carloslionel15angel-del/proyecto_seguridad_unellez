{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema - UNELLEZ</title>
    <style>
        /* Video de fondo */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(40%);
        }

        body { font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .login-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 2rem; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            border-top: 5px solid #b18c2e; 
            width: 320px; 
            text-align: center; 
        }

        h2 { color: #1a2a40; margin-bottom: 1.5rem; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button[type="submit"] { background: #1a2a40; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 10px; }
        button[type="submit"]:hover { background: #b18c2e; }
        
        /* Estilos para las Alertas */
        .alert {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: left;
        }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .password-wrapper { position: relative; width: 100%; }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .links { margin-top: 15px; }
        a { color: #1a2a40; text-decoration: none; font-size: 0.85rem; display: block; margin-top: 8px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="{% static 'seguridad_unellez/fondo.mp4' %}" type="video/mp4">
    </video>

    <div class="login-card">
        <h2>Acceso al Sistema</h2>

        {% if form.errors %}
            <div class="alert alert-error">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" autocomplete="off">
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Usuario" required>
            
            <div class="password-wrapper">
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
            </div>
            
            <button type="submit">Ingresar</button>

            <div class="links">
                <a href="{% url 'password_reset' %}">¿Olvidaste tu contraseña?</a>
                <a href="{% url 'registrar_usuario' %}">Crear usuario nuevo</a>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const btn = document.querySelector(".toggle-password");
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "🕶️"; 
            } else {
                input.type = "password";
                btn.textContent = "👁️"; 
            }
        }
    </script>
</body>
</html>
